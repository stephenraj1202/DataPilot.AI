name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/finops

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Test api-gateway
        run: go test ./...
        working-directory: services/api-gateway

      - name: Test auth-service
        run: go test ./...
        working-directory: services/auth-service

      - name: Test billing-service
        run: go test ./...
        working-directory: services/billing-service

      - name: Test finops-service
        run: go test ./...
        working-directory: services/finops-service

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Test ai-query-engine
        run: |
          pip install -r requirements.txt
          pytest tests/
        working-directory: services/ai-query-engine

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        run: |
          npm ci
          npm run build
        working-directory: services/frontend

  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - name: api-gateway
            context: .
            dockerfile: services/api-gateway/Dockerfile
          - name: auth-service
            context: .
            dockerfile: services/auth-service/Dockerfile
          - name: billing-service
            context: .
            dockerfile: services/billing-service/Dockerfile
          - name: finops-service
            context: .
            dockerfile: services/finops-service/Dockerfile
          - name: ai-query-engine
            context: .
            dockerfile: services/ai-query-engine/Dockerfile
          - name: frontend
            context: ./services/frontend
            dockerfile: services/frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}:latest

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config

      - name: Deploy to staging
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/mysql-statefulset.yaml
          kubectl apply -f k8s/redis-deployment.yaml
          kubectl apply -f k8s/auth-service-deployment.yaml
          kubectl apply -f k8s/billing-service-deployment.yaml
          kubectl apply -f k8s/finops-service-deployment.yaml
          kubectl apply -f k8s/ai-query-engine-deployment.yaml
          kubectl apply -f k8s/api-gateway-deployment.yaml
          kubectl apply -f k8s/frontend-deployment.yaml

      - name: Update image tags
        run: |
          kubectl set image deployment/api-gateway api-gateway=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api-gateway:${{ github.sha }} -n finops-platform
          kubectl set image deployment/auth-service auth-service=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-auth-service:${{ github.sha }} -n finops-platform
          kubectl set image deployment/billing-service billing-service=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-billing-service:${{ github.sha }} -n finops-platform
          kubectl set image deployment/finops-service finops-service=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-finops-service:${{ github.sha }} -n finops-platform
          kubectl set image deployment/ai-query-engine ai-query-engine=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-ai-query-engine:${{ github.sha }} -n finops-platform
          kubectl set image deployment/frontend frontend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }} -n finops-platform

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/api-gateway -n finops-platform --timeout=120s
          kubectl rollout status deployment/auth-service -n finops-platform --timeout=120s
          kubectl rollout status deployment/frontend -n finops-platform --timeout=120s
