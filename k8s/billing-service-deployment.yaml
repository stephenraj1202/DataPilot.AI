apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-service
  namespace: finops-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: billing-service
  template:
    metadata:
      labels:
        app: billing-service
    spec:
      containers:
        - name: billing-service
          image: ghcr.io/your-org/finops-billing-service:latest
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: finops-config
          resources:
            requests:
              cpu: "250m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: billing-service
  namespace: finops-platform
spec:
  type: ClusterIP
  selector:
    app: billing-service
  ports:
    - port: 8082
      targetPort: 8082
