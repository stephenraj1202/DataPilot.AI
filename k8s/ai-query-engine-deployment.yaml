apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-query-engine
  namespace: finops-platform
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ai-query-engine
  template:
    metadata:
      labels:
        app: ai-query-engine
    spec:
      containers:
        - name: ai-query-engine
          image: ghcr.io/your-org/finops-ai-query-engine:latest
          ports:
            - containerPort: 8084
          envFrom:
            - configMapRef:
                name: finops-config
          resources:
            requests:
              cpu: "500m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 15
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: ai-query-engine
  namespace: finops-platform
spec:
  type: ClusterIP
  selector:
    app: ai-query-engine
  ports:
    - port: 8084
      targetPort: 8084
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-query-engine-hpa
  namespace: finops-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-query-engine
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
