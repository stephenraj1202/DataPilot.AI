  # ─────────────────────────────────────────────
  # FinOps Service endpoints
  # ─────────────────────────────────────────────

  /finops/cloud-accounts:
    post:
      tags: [finops]
      summary: Connect a cloud account
      description: |
        Connects a cloud provider account (AWS, Azure, or GCP). Credentials are validated
        and encrypted with AES-256 before storage. Cost data sync begins within 6 hours.

        **AWS credentials example:**
        ```json
        { "access_key_id": "AKIAIOSFODNN7EXAMPLE", "secret_access_key": "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY" }
        ```

        **Azure credentials example:**
        ```json
        { "tenant_id": "...", "client_id": "...", "client_secret": "...", "subscription_id": "..." }
        ```

        **GCP credentials example:**
        ```json
        { "type": "service_account", "project_id": "...", "private_key": "...", "client_email": "..." }
        ```

        **Plan limits:** Free=1, Base=3, Pro=10, Enterprise=unlimited
      operationId: connectCloudAccount
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloudAccountRequest'
            example:
              provider: "aws"
              account_name: "Production AWS"
              credentials:
                access_key_id: "AKIAIOSFODNN7EXAMPLE"
                secret_access_key: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
      responses:
        '201':
          description: Cloud account connected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CloudAccountResponse'
        '400':
          description: Invalid credentials or provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - requires Admin or Account_Owner role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Plan limit reached or rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "cloud account limit reached for your plan. Upgrade to add more."
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      tags: [finops]
      summary: List connected cloud accounts
      description: Returns all cloud accounts connected to the authenticated account.
      operationId: listCloudAccounts
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        '200':
          description: List of cloud accounts
          content:
            application/json:
              schema:
                type: object
                properties:
                  cloud_accounts:
                    type: array
                    items:
                      $ref: '#/components/schemas/CloudAccountResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /finops/costs/summary:
    get:
      tags: [finops]
      summary: Get cost summary
      description: |
        Returns aggregated cloud cost data for the specified date range.
        Includes breakdown by provider and service.

        **Rate limit:** 100 req/min (Free), 500 (Base), 2000 (Pro), 10000 (Enterprise)
      operationId: getCostSummary
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - name: start_date
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2024-01-01"
        - name: end_date
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2024-01-31"
        - name: provider
          in: query
          schema:
            type: string
            enum: [aws, azure, gcp]
          description: Filter by cloud provider
        - name: region
          in: query
          schema:
            type: string
          description: Filter by region (e.g., us-east-1)
          example: "us-east-1"
      responses:
        '200':
          description: Cost summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CostSummaryResponse'
              example:
                total_cost: 15420.50
                currency: "USD"
                start_date: "2024-01-01"
                end_date: "2024-01-31"
                breakdown_by_provider:
                  aws: 10200.00
                  azure: 3120.50
                  gcp: 2100.00
                breakdown_by_service:
                  - service: "EC2"
                    cost: 5000.00
                  - service: "S3"
                    cost: 1200.00
                  - service: "RDS"
                    cost: 2000.00
                  - service: "Lambda"
                    cost: 800.00
        '400':
          description: Invalid date range
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitError'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /finops/anomalies:
    get:
      tags: [finops]
      summary: List cost anomalies
      description: |
        Returns detected cost anomalies. Anomalies are flagged when daily cost exceeds
        the 30-day moving average baseline by more than 20%.

        **Severity levels:**
        - `low`: 20–40% deviation
        - `medium`: 40–60% deviation
        - `high`: >60% deviation
      operationId: listAnomalies
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 30
          description: Number of days to look back
          example: 30
        - name: severity
          in: query
          schema:
