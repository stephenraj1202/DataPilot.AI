  /billing/subscribe:
    post:
      tags: [billing]
      summary: Subscribe to a plan
      description: |
        Creates a Stripe subscription for the account. For paid plans, a valid
        `payment_method_id` from Stripe.js is required.

        **Plans:**
        - `free`: $0/month, 30-day trial, 1 cloud account, 2 databases, 100 req/min
        - `base`: $10/month, 3 cloud accounts, 5 databases, 500 req/min
        - `pro`: $20/month, 10 cloud accounts, unlimited databases, 2000 req/min
        - `enterprise`: $50/month, unlimited everything, 10000 req/min
      operationId: createSubscription
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscribeRequest'
            example:
              plan: "pro"
              payment_method_id: "pm_1234567890abcdef"
      responses:
        '201':
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscribeResponse'
        '400':
          description: Invalid plan or payment method
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '402':
          description: Payment required / payment failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

