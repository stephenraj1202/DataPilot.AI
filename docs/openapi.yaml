        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /billing/webhook:
    post:
      tags: [billing]
      summary: Stripe webhook handler
      description: |
        Receives and processes Stripe webhook events. The `Stripe-Signature` header
        is verified against the configured webhook secret before processing.

        **Processed events:**
        - `customer.subscription.created` - New subscription activated
        - `customer.subscription.updated` - Subscription plan or status changed
        - `customer.subscription.deleted` - Subscription cancelled
        - `invoice.payment_succeeded` - Payment successful, invoice stored
        - `invoice.payment_failed` - Payment failed, notification sent to Account_Owner

        **Idempotency:** Events are deduplicated by Stripe event ID to prevent double-processing.

        **Webhook payload examples:**

        ```json
        // invoice.payment_succeeded
        {
          "id": "evt_1234567890",
          "type": "invoice.payment_succeeded",
          "data": {
            "object": {
              "id": "in_1234567890",
              "customer": "cus_stripe123",
              "amount_paid": 2000,
              "currency": "usd",
              "status": "paid",
              "invoice_pdf": "https://invoice.stripe.com/..."
            }
          }
        }

        // invoice.payment_failed
        {
          "id": "evt_0987654321",
          "type": "invoice.payment_failed",
          "data": {
            "object": {
              "id": "in_0987654321",
              "customer": "cus_stripe123",
              "amount_due": 2000,
              "currency": "usd",
              "status": "open",
              "attempt_count": 1
            }
          }
        }

        // customer.subscription.deleted
        {
          "id": "evt_1122334455",
          "type": "customer.subscription.deleted",
          "data": {
            "object": {
              "id": "sub_stripe123",
              "customer": "cus_stripe123",
              "status": "canceled"
            }
          }
        }
        ```
      operationId: stripeWebhook
      security: []
      parameters:
        - name: Stripe-Signature
          in: header
          required: true
          schema:
            type: string
          description: Stripe webhook signature for verification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  example: "evt_1234567890"
                type:
                  type: string
                  example: "invoice.payment_succeeded"
                data:
                  type: object
      responses:
        '200':
          description: Webhook processed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                    example: true
        '400':
          description: Invalid signature or malformed payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /billing/plans:
    get:
      tags: [billing]
      summary: List available subscription plans
      description: Returns all available subscription plans with pricing and feature details.
      operationId: listPlans
      security: []
      responses:
        '200':
